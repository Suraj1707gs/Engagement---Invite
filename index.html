<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suraj & Gopika — Engagement Invitation</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
}

.rsvp-buttons {
  position: relative;
  margin-top: 20px;
  height: 150px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  cursor: pointer;
}

#no-btn {
  position: relative;
  transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}
</style>
</head>

<body>

<h1>Suraj & Gopika</h1>
<p>Engagement Invitation</p>

<input id="name" placeholder="Your Name" />

<div class="rsvp-buttons" id="container">
  <button onclick="submitRSVP('yes')">Yes, We'll Be There</button>
  <button id="no-btn" onclick="submitRSVP('no')">Unfortunately, Can't Make It</button>
</div>

<script>
function submitRSVP(choice) {
  const name = document.getElementById("name").value.trim();

  if (!name) {
    alert("Please enter your name");
    return;
  }

  let message = "";

  if (choice === "yes") {
    message = `Hi Suraj, this is ${name}. I’m excited to be part of your special day 🌸`;
  } else {
    message = `Hi Suraj, this is ${name}. I’ll miss it, but wishing you both a beautiful celebration 🌸`;
  }

  const url = `https://wa.me/918891091048?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

// 🔥 RUNAWAY BUTTON (LIMITED)
const noBtn = document.getElementById("no-btn");

let escapeCount = 0;
const maxEscapes = 5;

function moveButton() {
  if (escapeCount >= maxEscapes) return;

  escapeCount++;

  const container = document.getElementById("container");
  const rect = container.getBoundingClientRect();

  const maxX = rect.width - noBtn.offsetWidth;
  const maxY = 120;

  const x = Math.random() * maxX - noBtn.offsetLeft;
  const y = Math.random() * maxY - noBtn.offsetTop;

  const rotate = (Math.random() * 10) - 5;
  const scale = 0.95 + Math.random() * 0.1;

  noBtn.style.transform = `translate(${x}px, ${y}px) rotate(${rotate}deg) scale(${scale})`;

  if (escapeCount < maxEscapes) {
    noBtn.innerText = "Are you sure? 😄";
  } else {
    noBtn.innerText = "Okay okay 😅";
  }
}

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("touchstart", moveButton);
</script>

</body>
</html>
